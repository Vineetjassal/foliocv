<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FolioCV — Turn your story into a portfolio</title>
    <meta
      name="description"
      content="Drop a résumé JSON, paste your GitHub handle. FolioCV crafts a quiet, beautiful portfolio you can tweak inline and download as plain HTML."
    />
    <style>
      #folio-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        font-family: 'Segoe UI', system-ui, sans-serif;
        transition: opacity 0.5s ease;
      }
      @media (prefers-color-scheme: dark) {
        #folio-loader { background: #111111; }
      }
      #folio-loader.fl-out {
        opacity: 0;
        pointer-events: none;
      }

      .fl-wordmark {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: .18em;
        text-transform: uppercase;
        color: #111111;
      }
      @media (prefers-color-scheme: dark) {
        .fl-wordmark { color: #f0f0f0; }
      }

      .fl-progress-wrap {
        width: min(280px, 75vw);
        display: flex;
        flex-direction: column;
        gap: .55rem;
      }
      .fl-bar-track {
        width: 100%;
        height: 1px;
        background: #e0e0e0;
      }
      @media (prefers-color-scheme: dark) {
        .fl-bar-track { background: #2a2a2a; }
      }
      .fl-bar-fill {
        height: 100%;
        width: 0%;
        background: #111111;
        transition: width 0.1s linear;
      }
      @media (prefers-color-scheme: dark) {
        .fl-bar-fill { background: #f0f0f0; }
      }
      .fl-status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .fl-status {
        font-size: .65rem;
        letter-spacing: .08em;
        color: #999999;
      }
      .fl-percent {
        font-size: .65rem;
        font-variant-numeric: tabular-nums;
        letter-spacing: .04em;
        color: #111111;
        font-weight: 600;
      }
      @media (prefers-color-scheme: dark) {
        .fl-percent { color: #f0f0f0; }
      }
    </style>
  </head>
  <body>

    <div id="folio-loader" role="status" aria-label="Loading FolioCV">
      <div class="fl-wordmark">FolioCV</div>
      <div class="fl-progress-wrap">
        <div class="fl-bar-track">
          <div class="fl-bar-fill" id="fl-fill"></div>
        </div>
        <div class="fl-status-row">
          <span class="fl-status" id="fl-status">Loading…</span>
          <span class="fl-percent" id="fl-pct">0%</span>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      (function () {
        var fill   = document.getElementById('fl-fill');
        var pct    = document.getElementById('fl-pct');
        var status = document.getElementById('fl-status');
        var loader = document.getElementById('folio-loader');

        var steps = [
          { to: 20,  label: 'Loading…',     delay: 70 },
          { to: 45,  label: 'Setting up…',  delay: 55 },
          { to: 70,  label: 'Preparing…',   delay: 45 },
          { to: 90,  label: 'Almost done…', delay: 35 },
        ];

        var cur = 0, stepIdx = 0, timer = null;

        function setProgress(n) {
          cur = n;
          fill.style.width = n + '%';
          pct.textContent  = n + '%';
        }

        function runStep() {
          if (stepIdx >= steps.length) return;
          var s = steps[stepIdx];
          status.textContent = s.label;
          timer = setInterval(function () {
            if (cur < s.to) {
              setProgress(cur + 1);
            } else {
              clearInterval(timer);
              stepIdx++;
              setTimeout(runStep, 150);
            }
          }, s.delay);
        }

        runStep();

        window.__folioLoaderDismiss = function () {
          clearInterval(timer);
          var snap = setInterval(function () {
            if (cur < 100) {
              setProgress(Math.min(cur + 4, 100));
            } else {
              clearInterval(snap);
              status.textContent = 'Done';
              setTimeout(function () {
                loader.classList.add('fl-out');
                setTimeout(function () { loader.style.display = 'none'; }, 520);
              }, 200);
            }
          }, 16);
        };
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
